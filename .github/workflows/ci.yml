name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: pytest ${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        platform: [ubuntu-22.04, macos-latest, windows-latest]
        # decord and tables have flaky wheel availability on
        # macos-latest (arm64) and windows-latest; treat those runners
        # as informational until the numpy<2 pin is lifted in 1.3.0.
        include:
          - platform: macos-latest
            continue-on-error: true
          - platform: windows-latest
            continue-on-error: true
    continue-on-error: ${{ matrix.continue-on-error == true }}

    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install datanavigator (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable ".[dev]"

      - name: Show installed package versions
        run: python -m pip list

      - name: Run pytest
        run: python -m pytest tests/ -q
