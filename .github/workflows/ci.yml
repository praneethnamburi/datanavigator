name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: pytest ${{ matrix.python-version }} on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        # macos-latest is excluded for 1.2.0: `decord` (a transitive
        # dependency we cannot drop while the `numpy<2` pin is in
        # place) has no Apple Silicon wheel, so `pip install` fails
        # at resolution time. Re-add in 1.3.0 once the pin lifts and
        # decord is replaced or wrapped. See TODO.md.
        # windows-latest stays in matrix but is informational only
        # (continue-on-error) — the chocolatey ffmpeg has flaky
        # nvenc/encoder behavior in the headless runner environment.
        platform: [ubuntu-22.04, windows-latest]
        include:
          - platform: windows-latest
            continue-on-error: true
    continue-on-error: ${{ matrix.continue-on-error == true }}

    env:
      MPLBACKEND: Agg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install -y ffmpeg --no-progress

      - name: Install datanavigator (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable ".[dev]"

      - name: Show installed package versions
        run: python -m pip list

      - name: Run pytest
        run: python -m pytest tests/ -q
